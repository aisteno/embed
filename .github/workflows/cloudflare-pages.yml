name: Cloudflare Pages

on:
  push:
    branches-ignore:
      - release
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      build_version:
        description: "Optional version directory to publish under dist/v/<version>"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      BUILD_VERSION: ${{ github.event.inputs.build_version }}
    steps:
      - name: Validate Cloudflare configuration
        run: |
          if [ -z "$PROJECT_NAME" ]; then
            echo "Missing repository variable CLOUDFLARE_PAGES_PROJECT" >&2
            exit 1
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing secret CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "Missing secret CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build minified assets
        run: npm run build:minified

      - name: Deploy preview
        id: deploy-preview
        if: (github.event_name == 'push' && github.ref_name != 'main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'preview')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Deploy production
        id: deploy-production
        if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main --commit-dirty=true

      - name: Summarize preview deployment
        if: steps.deploy-preview.outcome == 'success'
        run: |
          {
            echo "## Cloudflare Pages Preview"
            echo
            echo "- Deployment URL: ${{ steps.deploy-preview.outputs.deployment-url }}"
            echo "- Branch alias URL: ${{ steps.deploy-preview.outputs.pages-deployment-alias-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize production deployment
        if: steps.deploy-production.outcome == 'success'
        run: |
          {
            echo "## Cloudflare Pages Production"
            echo
            echo "- Deployment URL: ${{ steps.deploy-production.outputs.deployment-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
